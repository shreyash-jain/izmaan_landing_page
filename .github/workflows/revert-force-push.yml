name: Revert Force Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  revert:
    if: github.event.forced == true && github.event.before != '0000000000000000000000000000000000000000'
    name: Revert force push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch overwritten commit
        run: git fetch origin ${{ github.event.before }}

      - name: Force-push previous SHA back to originating branch
        id: revert
        run: git push origin --force ${{ github.event.before }}:${{ github.ref }}

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ACTOR: ${{ github.actor }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [ "$STATUS" = "success" ]; then
            TEXT=":rewind: Reverted force push on \`$BRANCH\` by *$ACTOR* in *${{ github.repository }}*. Restored \`${BEFORE:0:8}\` over \`${AFTER:0:8}\`. <$RUN_URL|run>"
          else
            TEXT=":rotating_light: Force push on \`$BRANCH\` by *$ACTOR* in *${{ github.repository }}* but revert FAILED. Overwritten: \`${BEFORE:0:8}\`, new: \`${AFTER:0:8}\`. <$RUN_URL|run> — manual fix needed."
          fi
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"$TEXT\"}" \
            "$SLACK_WEBHOOK_URL"
